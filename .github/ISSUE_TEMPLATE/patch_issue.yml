name: LwFlutter patch issue
description: Report a problem that only happens with LwFlutter patches applied.
title: "[Patch]: "
labels:
  - patch
body:
  - type: markdown
    attributes:
      value: |
        Please only report issues here when they are related to the LwFlutter patches or release/setup infrastructure.

        Before submitting, test the same project with the matching official Flutter version from `flutter.version` and without LwFlutter patches. If it also happens there, please report it upstream to Flutter or to the affected app instead.
  - type: checkboxes
    id: confirmation
    attributes:
      label: Pre-flight checks
      options:
        - label: I tested the same project with the matching official Flutter version without LwFlutter patches.
          required: true
        - label: The issue does not happen on the matching official Flutter version.
          required: true
        - label: This issue is related to LwFlutter patches, release assets, or the setup action.
          required: true
  - type: input
    id: lwflutter_version
    attributes:
      label: LwFlutter release/tag
      description: "Example: v3.35.7-lw.1"
      placeholder: v3.35.7-lw.1
    validations:
      required: true
  - type: input
    id: flutter_version
    attributes:
      label: Official Flutter version tested
      description: This should match flutter.version unless you are intentionally testing another version.
      placeholder: 3.35.7
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - Linux
        - Other / setup action only
    validations:
      required: true
  - type: textarea
    id: official_flutter_result
    attributes:
      label: Result on official Flutter
      description: Describe how you tested without LwFlutter patches and what happened.
      placeholder: |
        Official Flutter command used:
        Result:
    validations:
      required: true
  - type: textarea
    id: lwflutter_result
    attributes:
      label: Result on LwFlutter
      description: Describe what changes when using LwFlutter.
      placeholder: |
        LwFlutter command/workflow used:
        Result:
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or workflow link
      description: Paste relevant logs, `flutter --version`, or a GitHub Actions run link.
      render: shell
    validations:
      required: false
