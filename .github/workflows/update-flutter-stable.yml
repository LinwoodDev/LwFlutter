name: Update Flutter stable

on:
  workflow_dispatch:
    inputs:
      run_patch_test:
        description: Test whether patches apply before opening the PR.
        required: false
        default: true
        type: boolean
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-stable:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout LwFlutter
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq p7zip-full

      - name: Update flutter.version
        id: update
        shell: bash
        run: |
          set -euo pipefail
          old="$(head -n 1 flutter.version | tr -d '[:space:]')"
          scripts/update_to_latest_stable.sh
          new="$(head -n 1 flutter.version | tr -d '[:space:]')"
          echo "old=$old" >> "$GITHUB_OUTPUT"
          echo "new=$new" >> "$GITHUB_OUTPUT"
          if [ "$old" != "$new" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Test patches on new Flutter stable
        if: ${{ steps.update.outputs.changed == 'true' && (github.event_name == 'schedule' || inputs.run_patch_test) }}
        shell: bash
        run: |
          set -euo pipefail
          scripts/test_patches_locally.sh --flutter-ref '${{ steps.update.outputs.new }}'

      - name: Create pull request
        if: ${{ steps.update.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          branch: update/flutter-stable-${{ steps.update.outputs.new }}
          title: Update Flutter stable to ${{ steps.update.outputs.new }}
          commit-message: Update Flutter stable to ${{ steps.update.outputs.new }}
          body: |
            Updates `flutter.version` from `${{ steps.update.outputs.old }}` to `${{ steps.update.outputs.new }}`.

            The workflow tested whether the current LwFlutter patches apply to the new Flutter stable version.
          labels: dependencies, flutter
