name: Setup LwFlutter
description: Setup official Flutter, apply LwFlutter patches if available, and optionally attach a prebuilt local engine.

inputs:
  flutter-version:
    description: Exact official Flutter version to install, for example 3.35.7. Omit when using flutter-version-file.
    required: false
    default: ''
  flutter-version-file:
    description: Path to pubspec.yaml, .fvmrc, or .fvm/fvm_config.json for subosito/flutter-action.
    required: false
    default: ''
  channel:
    description: Official Flutter channel used by subosito/flutter-action.
    required: false
    default: stable
  platforms:
    description: Comma-separated list of platforms for optional LwFlutter local engine, for example windows,linux. If omitted, it defaults to the current runner OS.
    required: false
    default: ''
  repo:
    description: Repository containing LwFlutter releases.
    required: false
    default: LinwoodDev/LwFlutter
  lwflutter-version:
    description: Optional explicit LwFlutter release tag, for example v3.35.7-lw.1. If empty, the newest matching v<flutter-version>-lw.* release is used.
    required: false
    default: ''
  use-lwflutter:
    description: Try to apply LwFlutter patches when a matching release exists.
    required: false
    default: 'true'
  cache:
    description: Enable Flutter SDK cache for official Flutter setup.
    required: false
    default: 'true'

outputs:
  flutter-root:
    description: Resolved Flutter SDK root.
    value: ${{ steps.paths.outputs.flutter-root }}
  using-lwflutter:
    description: true if LwFlutter patches were applied.
    value: ${{ steps.resolve.outputs.using-lwflutter }}
  using-local-engine:
    description: true if a local engine artifact was downloaded and extracted.
    value: ${{ steps.resolve.outputs.using-local-engine }}
  lwflutter-version:
    description: Resolved LwFlutter release tag, empty if none was used.
    value: ${{ steps.resolve.outputs.lwflutter-version }}
  local-engine-src-path:
    description: Value for --local-engine-src-path, empty if no local engine is used.
    value: ${{ steps.paths.outputs.local-engine-src-path }}
  local-engine:
    description: Value for --local-engine, empty if no local engine is used.
    value: ${{ steps.paths.outputs.local-engine }}
  local-engine-args:
    description: Ready-to-append local engine args, empty if no local engine is used.
    value: ${{ steps.paths.outputs.local-engine-args }}

runs:
  using: composite
  steps:
    - name: Normalize Flutter inputs
      id: flutter-inputs
      shell: bash
      run: |
        set -euo pipefail

        flutter_version="${{ inputs.flutter-version }}"
        flutter_version_file="${{ inputs.flutter-version-file }}"

        if [ -n "$flutter_version_file" ]; then
          flutter_version=""
        fi

        if [ -z "$flutter_version" ] && [ -z "$flutter_version_file" ]; then
          echo "::error::Provide either flutter-version or flutter-version-file."
          exit 1
        fi

        echo "flutter-version=$flutter_version" >> "$GITHUB_OUTPUT"
        echo "flutter-version-file=$flutter_version_file" >> "$GITHUB_OUTPUT"

    - name: Setup official Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ steps.flutter-inputs.outputs.flutter-version }}
        flutter-version-file: ${{ steps.flutter-inputs.outputs.flutter-version-file }}
        channel: ${{ inputs.channel }}
        cache: ${{ inputs.cache }}

    - name: Resolve Flutter version
      id: flutter-version
      shell: bash
      run: |
        set -euo pipefail
        flutter_version="$(flutter --version | head -n 1 | awk '{print $2}' | tr -d '[:space:]')"

        if [ -z "$flutter_version" ]; then
          echo "::error::Could not determine the installed Flutter version"
          exit 1
        fi

        echo "flutter-version=$flutter_version" >> "$GITHUB_OUTPUT"

    - name: Resolve platform engine asset
      id: engine
      shell: bash
      run: |
        set -euo pipefail

        runner_platform=""
        case "${{ runner.os }}" in
          Windows) runner_platform="windows" ;;
          Linux) runner_platform="linux" ;;
          macOS) runner_platform="macos" ;;
          *) runner_platform="" ;;
        esac

        configured_platforms="${{ inputs.platforms }}"

        if [ -z "$configured_platforms" ]; then
          configured_platforms="$runner_platform"
        fi

        normalized_platforms=""
        IFS=',; ' read -r -a platform_tokens <<< "$configured_platforms"
        for token in "${platform_tokens[@]}"; do
          token="${token,,}"
          token="${token//[$'\t\r\n ']/}"
          if [ -z "$token" ]; then
            continue
          fi

          if [ -z "$normalized_platforms" ]; then
            normalized_platforms="$token"
          else
            normalized_platforms="$normalized_platforms,$token"
          fi
        done

        platform=""
        if [ -n "$runner_platform" ] && [ -n "$normalized_platforms" ]; then
          case ",$normalized_platforms," in
            *,"$runner_platform",*)
              platform="$runner_platform"
              ;;
          esac
        fi

        case "$platform" in
          windows)
            engine_out="windows_release_x64"
            ;;
          linux)
            engine_out="linux_release_x64"
            ;;
          *)
            engine_out=""
            ;;
        esac

        echo "platforms=$normalized_platforms" >> "$GITHUB_OUTPUT"
        echo "platform=$platform" >> "$GITHUB_OUTPUT"
        echo "engine-out=$engine_out" >> "$GITHUB_OUTPUT"
        if [ -n "$engine_out" ]; then
          echo "engine-asset=lwflutter-engine-${engine_out}.zip" >> "$GITHUB_OUTPUT"
        else
          echo "engine-asset=" >> "$GITHUB_OUTPUT"
        fi

    - name: Find matching LwFlutter release
      id: resolve
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        repo="${{ inputs.repo }}"
        prefer="${{ inputs.use-lwflutter }}"
        explicit="${{ inputs.lwflutter-version }}"
        flutter_version="${{ steps.flutter-version.outputs.flutter-version }}"
        engine_asset="${{ steps.engine.outputs.engine-asset }}"

        echo "using-lwflutter=false" >> "$GITHUB_OUTPUT"
        echo "using-local-engine=false" >> "$GITHUB_OUTPUT"
        echo "lwflutter-version=" >> "$GITHUB_OUTPUT"

        if [ "$prefer" != "true" ]; then
          exit 0
        fi

        if [ -n "$explicit" ]; then
          candidates="$explicit"
        else
          candidates=$(gh release list \
            --repo "$repo" \
            --limit 100 \
            --json tagName,isPrerelease,isDraft,createdAt \
            --jq ".[] | select(.isDraft == false) | select(.tagName | startswith(\"v${flutter_version}-lw.\")) | .tagName")
        fi

        for tag in $candidates; do
          assets=$(gh release view "$tag" \
            --repo "$repo" \
            --json assets \
            --jq '.assets[].name' || true)

          if echo "$assets" | grep -qx "lwflutter-patches.zip"; then
            using_engine=false
            if [ -n "$engine_asset" ] && echo "$assets" | grep -qx "$engine_asset"; then
              using_engine=true
            fi

            echo "using-lwflutter=true" >> "$GITHUB_OUTPUT"
            echo "using-local-engine=$using_engine" >> "$GITHUB_OUTPUT"
            echo "lwflutter-version=$tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        done

    - name: Download LwFlutter patches
      if: ${{ steps.resolve.outputs.using-lwflutter == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        mkdir -p "$RUNNER_TEMP/lwflutter-download"

        gh release download "${{ steps.resolve.outputs.lwflutter-version }}" \
          --repo "${{ inputs.repo }}" \
          --pattern "lwflutter-patches.zip" \
          --dir "$RUNNER_TEMP/lwflutter-download"

    - name: Apply LwFlutter patches
      if: ${{ steps.resolve.outputs.using-lwflutter == 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        flutter_root="$(dirname "$(dirname "$(command -v flutter)")")"
        patch_dir="$RUNNER_TEMP/lwflutter-patches"
        mkdir -p "$patch_dir"
        7z x "$RUNNER_TEMP/lwflutter-download/lwflutter-patches.zip" -o"$patch_dir"

        cd "$flutter_root"
        git status --short

        shopt -s globstar nullglob
        patches=("$patch_dir"/patches/**/*.patch)

        if [ ${#patches[@]} -eq 0 ]; then
          echo "::warning::LwFlutter release contains no patch files. Continuing with official Flutter."
          exit 0
        fi

        for patch in "${patches[@]}"; do
          echo "Applying $patch"
          if grep -qE '^From [0-9a-f]{40} Mon Sep 17 00:00:00 2001$' "$patch"; then
            git am --3way --keep-cr "$patch"
          else
            git apply --3way "$patch"
          fi
        done

    - name: Download LwFlutter engine
      if: ${{ steps.resolve.outputs.using-local-engine == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        gh release download "${{ steps.resolve.outputs.lwflutter-version }}" \
          --repo "${{ inputs.repo }}" \
          --pattern "${{ steps.engine.outputs.engine-asset }}" \
          --dir "$RUNNER_TEMP/lwflutter-download"

    - name: Extract LwFlutter engine
      if: ${{ steps.resolve.outputs.using-local-engine == 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        flutter_root="$(dirname "$(dirname "$(command -v flutter)")")"
        out_dir="$flutter_root/engine/src/out"
        mkdir -p "$out_dir"

        7z x "$RUNNER_TEMP/lwflutter-download/${{ steps.engine.outputs.engine-asset }}" -o"$out_dir"

    - name: Resolve output paths
      id: paths
      shell: bash
      run: |
        set -euo pipefail

        flutter_root="$(dirname "$(dirname "$(command -v flutter)")")"
        echo "flutter-root=$flutter_root" >> "$GITHUB_OUTPUT"

        if [ "${{ steps.resolve.outputs.using-local-engine }}" = "true" ]; then
          engine_src="$flutter_root/engine/src"
          local_engine="${{ steps.engine.outputs.engine-out }}"
          echo "local-engine-src-path=$engine_src" >> "$GITHUB_OUTPUT"
          echo "local-engine=$local_engine" >> "$GITHUB_OUTPUT"
          echo "local-engine-args=--local-engine-src-path $engine_src --local-engine $local_engine" >> "$GITHUB_OUTPUT"
        else
          echo "local-engine-src-path=" >> "$GITHUB_OUTPUT"
          echo "local-engine=" >> "$GITHUB_OUTPUT"
          echo "local-engine-args=" >> "$GITHUB_OUTPUT"
        fi

    - name: Show selected Flutter
      shell: bash
      run: |
        echo "Using LwFlutter patches: ${{ steps.resolve.outputs.using-lwflutter }}"
        echo "Using local engine: ${{ steps.resolve.outputs.using-local-engine }}"
        echo "Resolved LwFlutter version: ${{ steps.resolve.outputs.lwflutter-version }}"
        echo "Resolved Flutter version: ${{ steps.flutter-version.outputs.flutter-version }}"
        echo "Resolved platform: ${{ steps.engine.outputs.platform }}"
        echo "Configured platforms: ${{ steps.engine.outputs.platforms }}"
        flutter --version
